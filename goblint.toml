min_glib_version = "2.66"

[rules]
include_order = false
g_param_spec_null_nick_blurb = false
use_g_object_class_install_properties = false
# Goblint trips over the GI_TEST_EXTERN macro
missing_implementation = false
# Can't use g_autoptr for MSVC
use_g_autofree = false
use_g_autoptr_error = false
use_g_autoptr_goto_cleanup = false
use_g_autoptr_inline_cleanup = false
